name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CORPORATE_FIXES_BUILDER_AUTH_MODE: "cloudflare-access"
      NEXT_PUBLIC_SUPPORT_TICKET_EMAIL_TO: "noreply@tamemj.com"
      NEXT_PUBLIC_SUPPORT_TICKET_EMAIL_ENDPOINT: ${{ secrets.NEXT_PUBLIC_SUPPORT_TICKET_EMAIL_ENDPOINT }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SHOW_APPS_SECTION: "false"
      NEXT_PUBLIC_DONATION_BTC_ADDRESS: "bc1qxftph64sf26c5mg68fpdsyttf6hudpq9rjszvj"
      NEXT_PUBLIC_DONATION_ETH_ADDRESS: "0x1391bd15E06597d891C54C5cd9Ad3C0a1A1eE9Cb"
      NEXT_PUBLIC_DONATION_BNB_ADDRESS: "0x1391bd15E06597d891C54C5cd9Ad3C0a1A1eE9Cb"
      NEXT_PUBLIC_DONATION_SOL_ADDRESS: "7PLXnbfBJqDGq7mhRovdA8PkTx5qaaktocjPgqWT2GE9"
      NEXT_PUBLIC_DONATION_LTC_ADDRESS: "ltc1qw70u3hs3yqacjftaumjefgdvcend0m77eqq37r"
      NEXT_PUBLIC_DONATION_XRP_ADDRESS: "rMCd6g7DGKS22yZa1ukhkbkNPk8TfgQg49"
      NEXT_PUBLIC_DONATION_XMR_ADDRESS: "4AbPcR5QxWhDQS7NtyPHS8e7J8FGRUKd122ASRbZnz7PYWckwvTUBTpCeebm6av8oy9Ss2uv9s5qx1rYKVVUV9zP7fJdBbA"
      NEXT_PUBLIC_DONATION_DOGE_ADDRESS: "DAEf6dB1ERpgHpDtkmoKniNBE2GrqBoMkt"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.ts', 'app/**/*.tsx', 'components/**/*.ts', 'components/**/*.tsx', 'lib/**/*.ts', 'lib/**/*.tsx', 'src/**/*.ts', 'src/**/*.tsx', 'types/**/*.ts', 'next.config.ts', 'tailwind.config.ts', 'postcss.config.js') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build static site
        run: npm run build:static

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory out \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
