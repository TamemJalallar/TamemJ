name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CORPORATE_FIXES_BUILDER_AUTH_MODE: "cloudflare-access"
      NEXT_PUBLIC_SUPPORT_TICKET_EMAIL_TO: "noreply@tamemj.com"
      NEXT_PUBLIC_SUPPORT_TICKET_EMAIL_ENDPOINT: ${{ secrets.NEXT_PUBLIC_SUPPORT_TICKET_EMAIL_ENDPOINT }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_DONATION_BTC_ADDRESS: "bc1qxftph64sf26c5mg68fpdsyttf6hudpq9rjszvj"
      NEXT_PUBLIC_DONATION_ETH_ADDRESS: "0x1391bd15E06597d891C54C5cd9Ad3C0a1A1eE9Cb"
      NEXT_PUBLIC_DONATION_BNB_ADDRESS: "0x1391bd15E06597d891C54C5cd9Ad3C0a1A1eE9Cb"
      NEXT_PUBLIC_DONATION_SOL_ADDRESS: "7PLXnbfBJqDGq7mhRovdA8PkTx5qaaktocjPgqWT2GE9"
      NEXT_PUBLIC_DONATION_LTC_ADDRESS: "ltc1qw70u3hs3yqacjftaumjefgdvcend0m77eqq37r"
      NEXT_PUBLIC_DONATION_XRP_ADDRESS: "rMCd6g7DGKS22yZa1ukhkbkNPk8TfgQg49"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build:static

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
